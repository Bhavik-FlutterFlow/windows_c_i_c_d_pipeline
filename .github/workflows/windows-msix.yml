# ╔══════════════════════════════════════════════════════════════════╗
# ║         Windows MSIX Build & Package — GitHub Actions           ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║                                                                  ║
# ║  WHAT THIS FILE DOES (in plain English):                         ║
# ║  Every time code is pushed to the "main" branch — or you         ║
# ║  trigger it manually — GitHub will automatically:                ║
# ║                                                                  ║
# ║    1. Spin up a temporary Windows computer in the cloud          ║
# ║    2. Download your app's source code onto it                    ║
# ║    3. Install Flutter (the framework your app is built with)     ║
# ║    4. Download all the packages your app depends on              ║
# ║    5. Compile your app into a Windows release build              ║
# ║    6. Package it into an .msix installer file                    ║
# ║    7. Save that installer so you can download it from GitHub     ║
# ║                                                                  ║
# ║  HOW TO DOWNLOAD THE INSTALLER AFTER A BUILD:                   ║
# ║    GitHub repo → Actions tab → click the latest run             ║
# ║    → scroll down to "Artifacts" → download windows-msix-<n>     ║
# ║    The zip contains your .msix installer. Double-click to        ║
# ║    install on any Windows machine.                               ║
# ║                                                                  ║
# ║  ⚠️  THINGS YOU MUST UPDATE BEFORE USING THIS:                   ║
# ║    Search for lines marked with  ← UPDATE  below                ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝

name: Windows MSIX Build

# ------------------------------------------------------------------
# WHEN DOES THIS WORKFLOW RUN?
#
#   Automatically:  whenever someone pushes code to the "main" branch
#   Manually:       go to Actions tab → "Windows MSIX Build" → "Run workflow"
#                   You can optionally type a version number (e.g. 1.2.0+5)
#                   to override the version set in pubspec.yaml. Leave it
#                   blank to use whatever version is already in the file.
# ------------------------------------------------------------------
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_version:
        description: "Optional: override the app version (e.g. 1.2.3+4). Leave blank to use pubspec.yaml."
        required: false
        default: ""

# ------------------------------------------------------------------
# PREVENT DUPLICATE BUILDS
#
# If you push two commits quickly, GitHub will cancel the older build
# and only run the newest one. This saves time and avoids confusion.
# ------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-msix:

    # --------------------------------------------------------------
    # THE BUILD MACHINE
    #
    # Windows desktop apps can only be compiled on Windows — so GitHub
    # gives us a temporary Windows computer ("runner") in the cloud.
    # It is created fresh for every run and deleted when done.
    # --------------------------------------------------------------
    runs-on: windows-latest

    # --------------------------------------------------------------
    # PUB CACHE LOCATION
    #
    # On Windows, Flutter stores downloaded packages at this path.
    # We declare it here once so the cache step below can reuse it.
    # This is a fixed path on all GitHub-hosted Windows machines.
    # --------------------------------------------------------------
    env:
      PUB_CACHE: C:\Users\runneradmin\AppData\Local\Pub\Cache

    steps:

      # ------------------------------------------------------------
      # STEP 1 — DOWNLOAD THE SOURCE CODE
      #
      # Copies your entire repository (all files, full history) onto
      # the temporary Windows machine so it can be compiled.
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # STEP 2 — RESTORE SAVED PACKAGES (CACHE)
      #
      # Flutter apps depend on many third-party packages (like plugins
      # and libraries). Downloading them from the internet on every
      # single build wastes several minutes.
      #
      # This step saves a copy of those packages after the first build
      # and reuses that copy on later builds — as long as your
      # pubspec.lock file has not changed (i.e. you haven't added,
      # removed, or upgraded any packages).
      #
      # First build:  cache miss → downloads everything → saves cache
      # Later builds: cache hit  → restores instantly   → skips download
      # ------------------------------------------------------------
      - name: Restore cached pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ------------------------------------------------------------
      # STEP 3 — INSTALL FLUTTER
      #
      # Downloads and installs the Flutter SDK on the Windows machine.
      #
      # ← UPDATE: change "flutter-version" to match the Flutter version
      #   you have installed locally. Run  flutter --version  in your
      #   terminal to find out what version you are on.
      #
      # Using a pinned version (instead of "latest") means everyone —
      # you, your teammates, and CI — builds with the exact same tools,
      # which prevents "it works on my machine" surprises.
      # ------------------------------------------------------------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"   # ← UPDATE to your Flutter version
          channel: stable
          cache: true                 # caches the Flutter SDK itself

      # ------------------------------------------------------------
      # STEP 4 — VERIFY THE FLUTTER INSTALL
      #
      # Runs "flutter doctor" which prints a summary of the Flutter
      # environment. This doesn't affect the build — it's purely for
      # debugging. If the build fails, the doctor output tells you why.
      # ------------------------------------------------------------
      - name: Verify Flutter installation
        run: flutter doctor -v

      # ------------------------------------------------------------
      # STEP 5 — INSTALL APP DEPENDENCIES
      #
      # Reads pubspec.yaml and downloads all the packages your app
      # needs (or restores them from the cache saved in Step 2).
      # This is the same as running  flutter pub get  on your machine.
      # ------------------------------------------------------------
      - name: Install dependencies
        run: flutter pub get

      # ------------------------------------------------------------
      # STEP 6 — OVERRIDE VERSION NUMBER (OPTIONAL)
      #
      # Only runs if you typed a version number into the manual trigger
      # input in Step 0. It rewrites the "version:" line in pubspec.yaml
      # before the build starts, so your installer carries that version.
      #
      # If you always push code and never use the manual trigger, this
      # step is skipped automatically — nothing to worry about.
      # ------------------------------------------------------------
      - name: Override build version (optional)
        if: ${{ github.event.inputs.build_version != '' }}
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.build_version }}"
          (Get-Content pubspec.yaml) -replace '^version:.*', "version: $version" |
            Set-Content pubspec.yaml
          Write-Host "pubspec.yaml version set to: $version"

      # ------------------------------------------------------------
      # STEP 7 — COMPILE THE WINDOWS APP
      #
      # Builds your Flutter app in "release" mode — this is the
      # optimised, production-ready version (smaller size, faster
      # performance) as opposed to the debug version you run locally.
      #
      # Output goes to:  build/windows/x64/runner/Release/
      # ------------------------------------------------------------
      - name: Build Windows release
        run: flutter build windows --release

      # ------------------------------------------------------------
      # STEP 8 — PACKAGE INTO AN MSIX INSTALLER
      #
      # Takes the compiled app from Step 7 and wraps it into a single
      # .msix file — the standard Windows installer format (like a
      # .dmg on Mac or a .apk on Android).
      #
      # All configuration is passed as flags here so that pubspec.yaml
      # stays clean (required for FlutterFlow-managed projects).
      #
      # ← UPDATE the four values below before your first real build:
      #
      #   --display-name           The name shown in the Windows installer
      #                            and Add/Remove Programs list.
      #
      #   --publisher-display-name Your name or company name, shown during
      #                            installation.
      #
      #   --identity-name          A unique ID for your app in reverse-domain
      #                            format (e.g. com.acme.myapp). Must be
      #                            unique if you ever publish to the
      #                            Microsoft Store.
      #
      #   --version                Must be four numbers separated by dots
      #                            (e.g. 1.0.0.1). Keep in sync with the
      #                            "version:" field in pubspec.yaml —
      #                            pubspec uses 1.0.0+1, MSIX uses 1.0.0.1.
      #
      # --install-certificate false
      #   The MSIX is signed with an auto-generated test certificate.
      #   Without this flag the tool asks "install the certificate? y/n"
      #   interactively — which crashes CI because there is no keyboard.
      #   This flag skips that prompt. The .msix file is still created.
      #   (Recipients install the cert manually on first install — see
      #    the README for instructions.)
      # ------------------------------------------------------------
      - name: Create MSIX package
        run: >
          dart run msix:create
          --display-name "Windows CI CD Pipeline"
          --publisher-display-name "Your Company Name"
          --identity-name "com.yourcompany.windowscicdpipeline"
          --version "1.0.0.1"
          --capabilities "internetClient"
          --install-certificate false

      # ------------------------------------------------------------
      # STEP 9 — UPLOAD THE INSTALLER AS A DOWNLOADABLE ARTIFACT
      #
      # Saves the .msix file to GitHub so you can download it later.
      #
      # HOW TO FIND IT:
      #   GitHub repo → Actions tab → click this run → scroll to
      #   "Artifacts" at the bottom → download "windows-msix-<number>"
      #   → unzip → double-click the .msix to install.
      #
      # The file is kept for 30 days, then automatically deleted.
      # If you need it longer, change "retention-days" below.
      #
      # "if-no-files-found: error" means the whole build is marked as
      # FAILED if the .msix was never created — so you always know
      # when something went wrong instead of silently getting nothing.
      # ------------------------------------------------------------
      - name: Upload MSIX installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix-${{ github.run_number }}
          path: build/windows/x64/runner/Release/*.msix
          retention-days: 30
          if-no-files-found: error
